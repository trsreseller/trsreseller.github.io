<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRS Reseller</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">
TRS <span>Reseller</span>
</div>

<div class="menu">
<button>🛒</button>
<button class="login">Login</button>
</div>

</header>

<section class="search-box">

<input type="text" id="searchInput" placeholder="Search Products...">

<button>🔍</button>

</section>

<section class="hero">

<h1>Welcome to TRS Reseller</h1>

<p>Bangladesh's Smart Reseller Platform</p>

<button class="start">Get Started</button>

</section>

<!-- Banner Slider -->

<section class="banner-slider">

<div class="slider">

<div class="slide active">
<img src="assets/banners/banner1.jpg" alt="Banner 1">
</div>

<div class="slide">
<img src="assets/banners/banner2.jpg" alt="Banner 2">
</div>

<div class="slide">
<img src="assets/banners/banner3.jpg" alt="Banner 3">
</div>

</div>

</section>

<!-- Categories -->

<section class="categories">

<h2>Categories</h2>

<div class="category-grid">

<div class="category-card">
<div class="category-icon">👕</div>
<p>Fashion</p>
</div>

<div class="category-card">
<div class="category-icon">📱</div>
<p>Electronics</p>
</div>

<div class="category-card">
<div class="category-icon">💄</div>
<p>Beauty</p>
</div>

<div class="category-card">
<div class="category-icon">🏠</div>
<p>Home</p>
</div>

<div class="category-card">
<div class="category-icon">👟</div>
<p>Shoes</p>
</div>

<div class="category-card">
<div class="category-icon">💻</div>
<p>Laptop</p>
</div>

</div>

</section>

<!-- Featured Products -->

<section class="products">

<h2>Featured Products</h2>

<div class="product-grid" id="productGrid">

</div>

</section>

<script type="module" src="app.js"></script>

<div class="product-modal" id="productModal">

<div class="modal-content">

<span class="close-modal">&times;</span>

<img src="assets/product1.jpg" alt="Product">

<h2>Premium T-Shirt</h2>

<p>Selling Price: <b>৳850</b></p>

<p>Reseller Profit: <b style="color:green;">৳150</b></p>

<p>
High quality premium cotton T-shirt.
</p>

<button class="buy-btn">
Add to Cart
</button>

</div>

</div>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

<button class="nav-item active">

🏠

<span>Home</span>

</button>

<button class="nav-item">

📂

<span>Category</span>

</button>

<button class="nav-item">

🛒

<span>Cart</span>

</button>

<button class="nav-item">

👤

<span>Account</span>

</button>

</nav>
</body>
</html>
