<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRS Reseller Admin Login</title>

<link rel="stylesheet" href="style.css">

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f7fb;
}

.login-box{
background:#fff;
padding:25px;
border-radius:15px;
width:90%;
max-width:350px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
}

.login-box button{
width:100%;
padding:12px;
border:none;
background:#2563EB;
color:#fff;
font-size:16px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Admin Email">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
